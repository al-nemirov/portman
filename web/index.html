<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PORTMAN // 1985</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
  :root {
    --magenta: #ff2db5;
    --cyan: #00f0ff;
    --purple: #b026ff;
    --yellow: #ffe14d;
    --red: #ff3060;
    --bg-deep: #0a0023;
    --bg-mid:  #1a0640;
    --bg-panel: rgba(20, 8, 50, 0.85);
    --text: #e8d8ff;
    --text-dim: #8c7bb8;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    color: var(--text);
    font: 13px/1.4 "Consolas", "Courier New", ui-monospace, monospace;
    background:
      linear-gradient(180deg, transparent 0%, transparent 55%, rgba(255, 45, 181, 0.15) 60%, transparent 80%),
      linear-gradient(180deg, #0a0023 0%, #1a0640 50%, #2d0a5c 100%);
    background-attachment: fixed;
    overflow-x: hidden;
    min-height: 100vh;
  }
  /* Сетка-перспектива на дне */
  body::before {
    content: ""; position: fixed; left: 0; right: 0; bottom: 0; height: 50vh;
    background:
      linear-gradient(transparent, transparent 80%, rgba(255, 45, 181, 0.08) 100%),
      repeating-linear-gradient(0deg,
        transparent 0, transparent 35px,
        rgba(255, 45, 181, 0.4) 35px, rgba(255, 45, 181, 0.4) 36px),
      repeating-linear-gradient(90deg,
        transparent 0, transparent 35px,
        rgba(0, 240, 255, 0.25) 35px, rgba(0, 240, 255, 0.25) 36px);
    transform: perspective(400px) rotateX(60deg) translateY(20%);
    transform-origin: center top;
    pointer-events: none; z-index: 0;
    mask-image: linear-gradient(to bottom, black 30%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 30%, transparent 100%);
  }
  /* Лёгкие сканлайны */
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background: repeating-linear-gradient(to bottom,
      rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
  }

  /* Шапка */
  header {
    position: relative; z-index: 10;
    display: grid; grid-template-columns: auto 1fr auto; align-items: center;
    gap: 20px;
    padding: 18px 28px;
    background: linear-gradient(180deg, rgba(10, 0, 35, 0.95) 0%, rgba(20, 8, 50, 0.7) 100%);
    border-bottom: 2px solid var(--magenta);
    box-shadow: 0 0 30px rgba(255, 45, 181, 0.4), inset 0 -1px 0 var(--cyan);
  }
  .brand { display: flex; align-items: center; gap: 18px; }
  .brand img {
    width: 56px; height: 56px;
    filter: drop-shadow(0 0 10px var(--magenta)) drop-shadow(0 0 18px var(--cyan));
    image-rendering: pixelated;
  }
  .brand .titles h1 {
    margin: 0; font-size: 26px; letter-spacing: 0.32em; font-weight: 900;
    background: linear-gradient(180deg, #fff 0%, var(--cyan) 50%, var(--magenta) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 18px rgba(255, 45, 181, 0.7);
    line-height: 1;
  }
  .brand .titles .sub {
    font-size: 10px; letter-spacing: 0.42em; color: var(--cyan);
    text-shadow: 0 0 6px var(--cyan); margin-top: 4px;
  }

  .stats { display: flex; gap: 22px; justify-content: center; }
  .stat {
    text-align: center; padding: 0 8px;
    border-left: 1px dashed rgba(255, 45, 181, 0.4);
    border-right: 1px dashed rgba(0, 240, 255, 0.3);
  }
  .stat .v {
    display: block; font-size: 22px; font-weight: bold; line-height: 1;
    color: var(--cyan); text-shadow: 0 0 10px var(--cyan);
    font-family: "Consolas", monospace;
  }
  .stat .l { font-size: 10px; letter-spacing: 0.3em; color: var(--text-dim); margin-top: 4px; display: block; }
  .stat.idle .v { color: var(--yellow); text-shadow: 0 0 10px var(--yellow); }
  .stat.prot .v { color: var(--magenta); text-shadow: 0 0 10px var(--magenta); }

  .ctrls { display: flex; align-items: center; gap: 12px; }

  .lang-select {
    background: transparent; color: var(--cyan);
    border: 1px solid var(--cyan); padding: 6px 8px;
    font: inherit; font-size: 11px; letter-spacing: 0.18em;
    cursor: pointer; box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
  }
  .lang-select:focus { outline: none; }
  .lang-select option { background: var(--bg-deep); color: var(--text); }

  .auto-toggle {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 18px;
    border: 2px solid var(--magenta); background: transparent;
    color: var(--text); font: inherit; letter-spacing: 0.2em; font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(255, 45, 181, 0.4), inset 0 0 8px rgba(255, 45, 181, 0.1);
    text-shadow: 0 0 8px var(--magenta);
  }
  .auto-toggle.on {
    background: linear-gradient(180deg, var(--magenta), var(--purple));
    color: #fff; border-color: var(--cyan);
    box-shadow: 0 0 24px var(--magenta), 0 0 40px rgba(255, 45, 181, 0.5);
  }
  .auto-toggle .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--text-dim); box-shadow: 0 0 6px currentColor;
  }
  .auto-toggle.on .dot { background: var(--cyan); animation: pulse 1.2s infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 6px var(--cyan); transform: scale(1); }
    50% { box-shadow: 0 0 16px var(--cyan); transform: scale(1.3); }
  }

  .cog {
    background: transparent; border: 2px solid var(--cyan);
    color: var(--cyan); width: 38px; height: 38px;
    cursor: pointer; font: inherit; font-size: 16px;
    box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
    text-shadow: 0 0 6px var(--cyan);
  }
  .cog:hover { background: rgba(0, 240, 255, 0.15); }

  /* Таблица */
  main {
    position: relative; z-index: 5;
    padding: 22px 28px 80px;
    max-width: 1400px; margin: 0 auto;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-weight: bold; font-size: 11px; letter-spacing: 0.25em;
    color: var(--cyan); text-align: left;
    padding: 10px 12px; border-bottom: 1px solid var(--magenta);
    text-shadow: 0 0 6px var(--cyan);
  }
  tbody td {
    padding: 12px; border-bottom: 1px dotted rgba(176, 38, 255, 0.3);
    vertical-align: middle;
  }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: rgba(255, 45, 181, 0.08); }

  tr.reg td:first-child::before {
    content: "●"; color: var(--cyan); margin-right: 8px;
    text-shadow: 0 0 8px var(--cyan);
  }
  tr.dev td:first-child::before {
    content: "◆"; color: var(--yellow); margin-right: 8px;
    text-shadow: 0 0 8px var(--yellow);
  }
  tr.prot td:first-child::before {
    content: "◈"; color: var(--purple); margin-right: 8px;
  }

  .pid { color: var(--text-dim); font-size: 12px; font-family: monospace; }
  .name .label {
    color: var(--magenta); font-weight: bold;
    text-shadow: 0 0 8px var(--magenta);
  }
  .ports { letter-spacing: 0.1em; color: var(--text); }
  .ports .p-lock { color: var(--text-dim); }

  .conn { text-align: center; width: 60px; font-weight: bold; }
  .conn.high { color: var(--yellow); text-shadow: 0 0 8px var(--yellow); font-size: 16px; }

  .status { width: 110px; letter-spacing: 0.2em; font-size: 11px; font-weight: bold; }
  .status.active { color: var(--yellow); text-shadow: 0 0 8px var(--yellow); }
  .status.idle   { color: var(--red); text-shadow: 0 0 8px var(--red); }
  .status.listen { color: var(--cyan); text-shadow: 0 0 6px var(--cyan); }
  .status.prot   { color: var(--purple); }

  .meta { color: var(--text-dim); font-size: 12px; width: 130px; white-space: nowrap; }
  .act { width: 140px; text-align: right; }

  .btn-kill {
    background: transparent; color: var(--red);
    border: 2px solid var(--red); padding: 6px 16px;
    cursor: pointer; font: inherit; font-weight: bold;
    letter-spacing: 0.25em; font-size: 11px;
    text-shadow: 0 0 6px var(--red);
    box-shadow: 0 0 10px rgba(255, 48, 96, 0.4);
    transition: all 0.15s;
  }
  .btn-kill:hover {
    background: var(--red); color: #fff;
    box-shadow: 0 0 20px var(--red);
  }
  .locked-label {
    color: var(--purple); font-size: 11px; letter-spacing: 0.2em;
    border: 1px dashed var(--purple); padding: 5px 12px;
  }

  /* Drawer */
  .drawer {
    position: fixed; right: 0; top: 0; bottom: 0; width: 380px;
    background: linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 100%);
    border-left: 2px solid var(--cyan);
    padding: 28px; z-index: 200; transform: translateX(100%);
    transition: transform 0.3s; overflow-y: auto;
    box-shadow: -10px 0 60px rgba(0, 240, 255, 0.3);
  }
  .drawer.open { transform: translateX(0); }
  .drawer h2 {
    font-size: 14px; letter-spacing: 0.3em; margin: 0 0 20px;
    color: var(--cyan); font-weight: bold;
    text-shadow: 0 0 10px var(--cyan);
  }
  .drawer label {
    display: block; margin: 16px 0 5px;
    font-size: 11px; letter-spacing: 0.2em; color: var(--magenta);
    text-shadow: 0 0 6px var(--magenta);
  }
  .drawer input {
    width: 100%; background: rgba(0,0,0,0.4); color: var(--text);
    border: 1px solid var(--purple); padding: 8px 10px; font: inherit;
    box-shadow: inset 0 0 8px rgba(176, 38, 255, 0.2);
  }
  .drawer input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
  .drawer .row2 { display: flex; gap: 10px; }
  .drawer .help {
    margin-top: 28px; font-size: 11px; letter-spacing: 0.1em;
    color: var(--text-dim); line-height: 1.8;
    border-left: 2px solid var(--magenta); padding-left: 12px;
  }

  .foot {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 10px 28px; font-size: 11px; letter-spacing: 0.2em;
    color: var(--text-dim);
    background: linear-gradient(180deg, transparent, var(--bg-deep) 80%);
    border-top: 1px solid var(--magenta); z-index: 50;
    text-align: center;
  }
  .foot #msg { color: var(--cyan); text-shadow: 0 0 6px var(--cyan); margin-left: 12px; }

  .empty {
    text-align: center; padding: 60px;
    color: var(--magenta); letter-spacing: 0.3em; font-size: 14px;
    text-shadow: 0 0 12px var(--magenta);
  }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(10, 0, 35, 0.85);
    backdrop-filter: blur(4px);
    z-index: 300; display: none; align-items: center; justify-content: center;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: linear-gradient(180deg, var(--bg-deep), var(--bg-mid));
    border: 2px solid var(--red);
    padding: 28px; min-width: 360px; max-width: 480px;
    box-shadow: 0 0 60px var(--red), 0 0 100px rgba(255, 48, 96, 0.3);
  }
  .modal h3 {
    margin: 0 0 16px; color: var(--red);
    text-shadow: 0 0 10px var(--red);
    letter-spacing: 0.25em; font-weight: bold; font-size: 15px;
  }
  .modal p { margin: 0 0 10px; color: var(--text); font-size: 13px; }
  .modal .mono { color: var(--yellow); font-size: 12px; word-break: break-all; text-shadow: 0 0 6px var(--yellow); }
  .modal-acts { margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end; }
  .modal-acts button {
    background: transparent; border: 2px solid var(--cyan); color: var(--cyan);
    padding: 8px 20px; font: inherit; letter-spacing: 0.2em;
    font-size: 11px; font-weight: bold; cursor: pointer;
    text-shadow: 0 0 6px var(--cyan);
  }
  .modal-acts button.danger { border-color: var(--red); color: var(--red); text-shadow: 0 0 6px var(--red); }
  .modal-acts button:hover { background: rgba(0, 240, 255, 0.15); }
  .modal-acts button.danger:hover { background: var(--red); color: #fff; }

  @media (max-width: 980px) {
    header { grid-template-columns: 1fr; gap: 14px; }
    .brand { justify-content: center; }
    .stats { flex-wrap: wrap; }
    .ctrls { justify-content: center; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="/logo.png" alt="PORTMAN">
    <div class="titles">
      <h1>PORTMAN</h1>
      <div class="sub">★ LOCALHOST DISPATCHER · 1985 ★</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><span class="v" id="cnt">—</span><span class="l" data-i18n="proc">PROC</span></div>
    <div class="stat idle"><span class="v" id="cntIdle">—</span><span class="l" data-i18n="idle">IDLE</span></div>
    <div class="stat prot"><span class="v" id="cntProt">—</span><span class="l" data-i18n="prot">PROT</span></div>
  </div>

  <div class="ctrls">
    <select class="lang-select" id="lang">
      <option value="en">EN · English</option>
      <option value="ko">KO · 한국어</option>
      <option value="de">DE · Deutsch</option>
      <option value="es">ES · Español</option>
    </select>
    <button class="auto-toggle" id="autoBtn"><span class="dot"></span><span id="autoLabel">AUTO · OFF</span></button>
    <button class="cog" id="cogBtn" title="settings">⚙</button>
  </div>
</header>

<main>
  <table>
    <thead>
      <tr>
        <th style="width: 90px">PID</th>
        <th id="thName">NAME</th>
        <th style="width: 160px" id="thPorts">PORTS</th>
        <th class="conn" id="thConn">CONN</th>
        <th class="status" id="thStatus">STATUS</th>
        <th class="meta" id="thAge">AGE · IDLE</th>
        <th class="act"></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="empty" class="empty" style="display:none">— NO PROCESSES —</div>
</main>

<div class="drawer" id="drawer">
  <h2 id="drawerTitle">▎ SETTINGS</h2>
  <label id="lblIdle">IDLE THRESHOLD (min)</label>
  <input type="number" id="idleMinutes" min="1">
  <label id="lblRange">DEV PORT RANGE</label>
  <div class="row2">
    <input type="number" id="portFrom" min="1">
    <input type="number" id="portTo" min="1">
  </div>
  <label id="lblExtraNames">EXTRA PROTECTED NAMES (comma)</label>
  <input type="text" id="extraNames" placeholder="myapp.exe, node.exe">
  <label id="lblExtraPorts">EXTRA PROTECTED PORTS</label>
  <input type="text" id="extraPorts" placeholder="4200, 5173">
  <div style="margin-top: 24px;">
    <button class="auto-toggle" id="saveBtn" style="width:100%; justify-content:center">▸ SAVE</button>
  </div>
  <p class="help" id="drawerHelp"></p>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="mTitle">▎ CONFIRM KILL</h3>
    <p><span id="mPrefix">This process</span> <b id="mReason"></b>. <span id="mSuffix">Kill it?</span></p>
    <p class="mono" id="mInfo"></p>
    <div class="modal-acts">
      <button id="mCancel">CANCEL</button>
      <button class="danger" id="mOk">▸ KILL</button>
    </div>
  </div>
</div>

<div class="foot">
  <span id="ts">—</span> · <span id="footUpdate">UPDATE 3s</span><span id="msg"></span>
</div>

<script>
const I18N = {
  en: {
    proc:'PROC',idle:'IDLE',prot:'PROT',autoOn:'AUTO · ON',autoOff:'AUTO · OFF',
    thName:'NAME',thPorts:'PORTS',thConn:'CONN',thStatus:'STATUS',thAge:'AGE · IDLE',
    stProtected:'PROTECTED',stActive:'ACTIVE',stIdle:'IDLE',stListen:'LISTEN',
    btnKill:'▸ KILL',btnLocked:'◈ LOCKED',empty:'— NO PROCESSES —',
    drawerTitle:'▎ SETTINGS',lblIdle:'IDLE THRESHOLD (min)',lblRange:'DEV PORT RANGE',
    lblExtraNames:'EXTRA PROTECTED NAMES (comma)',lblExtraPorts:'EXTRA PROTECTED PORTS',
    btnSave:'▸ SAVE',
    help:'System processes and ports < 1024 are protected automatically. Auto mode only touches the dev range with 0 connections older than IDLE THRESHOLD minutes.',
    mTitle:'▎ CONFIRM KILL',mPrefix:'This process',mSuffix:'Kill it?',
    rOutOfRange:'is outside the dev port range',rHasConn:n=>`has ${n} active connections`,
    btnCancel:'CANCEL',flashSaved:'SAVED',flashAutoOn:'AUTO ENABLED',flashAutoOff:'AUTO DISABLED',
    flashKilled:p=>'KILLED '+p,flashFail:p=>'FAIL '+p,flashProtected:r=>'PROTECTED: '+r,
    footUpdate:'UPDATE 3s',
  },
  ko: {
    proc:'프로세스',idle:'유휴',prot:'보호',autoOn:'자동 · 켜짐',autoOff:'자동 · 꺼짐',
    thName:'이름',thPorts:'포트',thConn:'연결',thStatus:'상태',thAge:'실행 · 유휴',
    stProtected:'보호됨',stActive:'활성',stIdle:'유휴',stListen:'대기',
    btnKill:'▸ 종료',btnLocked:'◈ 잠김',empty:'— 프로세스 없음 —',
    drawerTitle:'▎ 설정',lblIdle:'유휴 임계값 (분)',lblRange:'개발용 포트 범위',
    lblExtraNames:'추가 보호 이름 (쉼표)',lblExtraPorts:'추가 보호 포트',btnSave:'▸ 저장',
    help:'시스템 프로세스와 1024 미만 포트는 자동으로 보호됩니다. 자동 모드는 개발 포트 범위 내에서 연결이 0이고 임계값을 초과한 프로세스만 종료합니다.',
    mTitle:'▎ 종료 확인',mPrefix:'이 프로세스는',mSuffix:'종료하시겠습니까?',
    rOutOfRange:'개발 포트 범위 밖에 있습니다',rHasConn:n=>`활성 연결 ${n}개를 가지고 있습니다`,
    btnCancel:'취소',flashSaved:'저장됨',flashAutoOn:'자동 활성화됨',flashAutoOff:'자동 비활성화됨',
    flashKilled:p=>'종료됨 '+p,flashFail:p=>'실패 '+p,flashProtected:r=>'보호됨: '+r,
    footUpdate:'갱신 3초',
  },
  de: {
    proc:'PROC',idle:'LEERLAUF',prot:'GESCHÜTZT',autoOn:'AUTO · AN',autoOff:'AUTO · AUS',
    thName:'NAME',thPorts:'PORTS',thConn:'VERB',thStatus:'STATUS',thAge:'ALTER · LEERL',
    stProtected:'GESCHÜTZT',stActive:'AKTIV',stIdle:'LEERLAUF',stListen:'LAUSCHT',
    btnKill:'▸ TÖTEN',btnLocked:'◈ GESPERRT',empty:'— KEINE PROZESSE —',
    drawerTitle:'▎ EINSTELLUNGEN',lblIdle:'LEERLAUF-SCHWELLE (Min)',lblRange:'DEV-PORT-BEREICH',
    lblExtraNames:'ZUSATZ GESCHÜTZTE NAMEN (Komma)',lblExtraPorts:'ZUSATZ GESCHÜTZTE PORTS',btnSave:'▸ SPEICHERN',
    help:'Systemprozesse und Ports < 1024 sind automatisch geschützt. Der Auto-Modus berührt nur den Dev-Port-Bereich mit 0 Verbindungen, älter als die Leerlauf-Schwelle.',
    mTitle:'▎ TÖTEN BESTÄTIGEN',mPrefix:'Dieser Prozess',mSuffix:'Wirklich töten?',
    rOutOfRange:'liegt außerhalb des Dev-Port-Bereichs',rHasConn:n=>`hat ${n} aktive Verbindungen`,
    btnCancel:'ABBRECHEN',flashSaved:'GESPEICHERT',flashAutoOn:'AUTO AKTIVIERT',flashAutoOff:'AUTO DEAKTIVIERT',
    flashKilled:p=>'GETÖTET '+p,flashFail:p=>'FEHLER '+p,flashProtected:r=>'GESCHÜTZT: '+r,
    footUpdate:'AKTUALISIERUNG 3s',
  },
  es: {
    proc:'PROC',idle:'INACTIVO',prot:'PROTEGIDO',autoOn:'AUTO · ON',autoOff:'AUTO · OFF',
    thName:'NOMBRE',thPorts:'PUERTOS',thConn:'CONN',thStatus:'ESTADO',thAge:'EDAD · INACT',
    stProtected:'PROTEGIDO',stActive:'ACTIVO',stIdle:'INACTIVO',stListen:'ESCUCHA',
    btnKill:'▸ MATAR',btnLocked:'◈ BLOQUEADO',empty:'— SIN PROCESOS —',
    drawerTitle:'▎ AJUSTES',lblIdle:'UMBRAL DE INACTIVIDAD (min)',lblRange:'RANGO DE PUERTOS DEV',
    lblExtraNames:'NOMBRES PROTEGIDOS EXTRA (coma)',lblExtraPorts:'PUERTOS PROTEGIDOS EXTRA',btnSave:'▸ GUARDAR',
    help:'Los procesos del sistema y puertos < 1024 están protegidos automáticamente. El modo auto solo toca el rango de puertos dev con 0 conexiones más antiguos que el umbral.',
    mTitle:'▎ CONFIRMAR MATAR',mPrefix:'Este proceso',mSuffix:'¿Matarlo?',
    rOutOfRange:'está fuera del rango de puertos dev',rHasConn:n=>`tiene ${n} conexiones activas`,
    btnCancel:'CANCELAR',flashSaved:'GUARDADO',flashAutoOn:'AUTO ACTIVADO',flashAutoOff:'AUTO DESACTIVADO',
    flashKilled:p=>'MATADO '+p,flashFail:p=>'FALLO '+p,flashProtected:r=>'PROTEGIDO: '+r,
    footUpdate:'ACTUALIZACIÓN 3s',
  },
};

const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let lang = localStorage.getItem('portman-lang') || 'en';
let t = I18N[lang];
let state = { settings: null, items: [] };

function applyLang() {
  t = I18N[lang]; document.documentElement.lang = lang; $('lang').value = lang;
  document.querySelector('[data-i18n=proc]').textContent = t.proc;
  document.querySelector('[data-i18n=idle]').textContent = t.idle;
  document.querySelector('[data-i18n=prot]').textContent = t.prot;
  $('thName').textContent = t.thName; $('thPorts').textContent = t.thPorts;
  $('thConn').textContent = t.thConn; $('thStatus').textContent = t.thStatus;
  $('thAge').textContent = t.thAge;
  $('drawerTitle').textContent = t.drawerTitle;
  $('lblIdle').textContent = t.lblIdle; $('lblRange').textContent = t.lblRange;
  $('lblExtraNames').textContent = t.lblExtraNames; $('lblExtraPorts').textContent = t.lblExtraPorts;
  $('saveBtn').lastChild.textContent = t.btnSave; $('drawerHelp').textContent = t.help;
  $('mTitle').textContent = t.mTitle; $('mPrefix').textContent = t.mPrefix;
  $('mSuffix').textContent = t.mSuffix; $('mCancel').textContent = t.btnCancel;
  $('mOk').textContent = t.btnKill;
  $('empty').textContent = t.empty; $('footUpdate').textContent = t.footUpdate;
}

async function api(p, opts) { const r = await fetch(p, opts); return r.json(); }
function fmtIdle(sec) {
  if (sec === null || sec === undefined) return '—';
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.round(sec / 60) + 'm';
  return Math.round(sec / 3600) + 'h';
}
function rowClass(it) {
  if (it.protected) return 'prot';
  if (it.registered) return 'reg';
  if (it.inDevRange) return 'dev';
  return '';
}
function statusOf(it) {
  if (it.protected) return { cls:'prot', label:t.stProtected };
  if (it.conn > 0) return { cls:'active', label:t.stActive };
  if (it.idleSec !== null && it.idleSec > 60) return { cls:'idle', label:t.stIdle };
  return { cls:'listen', label:t.stListen };
}

async function refresh() {
  const snap = await api('/api/snapshot'); state = snap;
  $('cnt').textContent = snap.items.length;
  $('cntIdle').textContent = snap.items.filter(i => !i.protected && i.conn === 0 && i.idleSec > 60).length;
  $('cntProt').textContent = snap.items.filter(i => i.protected).length;
  $('ts').textContent = new Date(snap.generatedAt).toLocaleTimeString();
  $('autoBtn').classList.toggle('on', !!snap.settings.autoEnabled);
  $('autoLabel').textContent = snap.settings.autoEnabled ? t.autoOn : t.autoOff;

  if (snap.items.length === 0) { $('rows').innerHTML = ''; $('empty').style.display = 'block'; return; }
  $('empty').style.display = 'none';

  $('rows').innerHTML = snap.items.map(it => {
    const st = statusOf(it);
    const portsHtml = it.ports.map(p => {
      const lock = p < 1024 || (snap.settings.extraProtectedPorts||[]).includes(p);
      return `<span class="${lock?'p-lock':''}">${p}</span>`;
    }).join(' ');
    const act = it.protected
      ? `<span class="locked-label">${esc(t.btnLocked)}</span>`
      : `<button class="btn-kill" data-kill="${it.pid}">${esc(t.btnKill)}</button>`;
    const label = it.label
      ? `<span class="label">${esc(it.label)}</span> <span class="pid">${esc(it.name)}</span>`
      : esc(it.name);
    return `<tr class="${rowClass(it)}">
      <td><span class="pid">${it.pid}</span></td>
      <td class="name">${label}</td>
      <td class="ports">${portsHtml}</td>
      <td class="conn ${it.conn>0?'high':''}">${it.conn}</td>
      <td class="status ${st.cls}">${esc(st.label)}</td>
      <td class="meta">${it.ageMin!==null?it.ageMin+'m':'—'} · ${fmtIdle(it.idleSec)}</td>
      <td class="act">${act}</td>
    </tr>`;
  }).join('');
  document.querySelectorAll('[data-kill]').forEach(b => b.onclick = () => tryKill(+b.dataset.kill));
}

async function tryKill(pid) {
  const it = state.items.find(x => x.pid === pid); if (!it) return;
  if (it.inDevRange && it.conn === 0) return doKill(pid);
  $('mReason').textContent = it.conn > 0 ? t.rHasConn(it.conn) : t.rOutOfRange;
  $('mInfo').textContent = `PID ${pid} · ${it.name} · ${it.ports.join(', ')}`;
  $('modal').classList.add('show');
  $('mOk').onclick = () => { $('modal').classList.remove('show'); doKill(pid); };
}

async function doKill(pid) {
  const r = await api('/api/kill', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ pid }) });
  if (r.error === 'protected') flash(t.flashProtected(r.reason));
  else flash(r.ok ? t.flashKilled(pid) : t.flashFail(pid));
  refresh();
}

function flash(m) {
  $('msg').textContent = ' · ' + m;
  clearTimeout(flash._t);
  flash._t = setTimeout(() => $('msg').textContent = '', 3000);
}

$('autoBtn').onclick = async () => {
  const next = !state.settings.autoEnabled;
  await api('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ autoEnabled: next }) });
  flash(next ? t.flashAutoOn : t.flashAutoOff); refresh();
};
$('cogBtn').onclick = () => {
  const s = state.settings;
  $('idleMinutes').value = s.idleMinutes; $('portFrom').value = s.watchPortsFrom;
  $('portTo').value = s.watchPortsTo;
  $('extraNames').value = (s.extraProtectedNames||[]).join(', ');
  $('extraPorts').value = (s.extraProtectedPorts||[]).join(', ');
  $('drawer').classList.toggle('open');
};
$('saveBtn').onclick = async () => {
  const body = {
    idleMinutes: +$('idleMinutes').value,
    watchPortsFrom: +$('portFrom').value, watchPortsTo: +$('portTo').value,
    extraProtectedNames: $('extraNames').value.split(',').map(s=>s.trim()).filter(Boolean),
    extraProtectedPorts: $('extraPorts').value.split(',').map(s=>+s.trim()).filter(n=>n>0),
  };
  await api('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  flash(t.flashSaved); $('drawer').classList.remove('open'); refresh();
};
$('mCancel').onclick = () => $('modal').classList.remove('show');
$('lang').onchange = e => { lang = e.target.value; localStorage.setItem('portman-lang', lang); applyLang(); refresh(); };

applyLang(); refresh(); setInterval(refresh, 3000);
</script>
</body>
</html>
