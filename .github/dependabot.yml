version: 2
updates:
  # devDependencies (currently only @yao-pkg/pkg)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
    reviewers:
      - al-nemirov

  # GitHub Actions versions (actions/checkout, setup-node, softprops/action-gh-release)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - ci
